name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    name: Build Aerizen Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show project files
        shell: pwsh
        run: |
          Write-Host "Current folder:"
          Get-Location
          Write-Host "Root files:"
          Get-ChildItem -Force
          Write-Host "SRC files:"
          Get-ChildItem -Force src
          Write-Host "Electron files:"
          Get-ChildItem -Force electron

      - name: Install dependencies
        shell: pwsh
        run: |
          if (Test-Path node_modules) {
            Remove-Item -Recurse -Force node_modules
          }

          npm install --include=dev --no-audit --no-fund

          npm install --save-dev vite@5.4.11 tailwindcss@3.4.17 postcss@8.4.49 autoprefixer@10.4.20 @vitejs/plugin-react@4.3.4 electron-builder@25.1.8 --no-audit --no-fund

      - name: Verify installed packages
        shell: pwsh
        run: |
          if (!(Test-Path "node_modules/tailwindcss")) {
            throw "ERROR: tailwindcss is still not installed"
          }

          if (!(Test-Path "node_modules/.bin/vite.cmd")) {
            throw "ERROR: vite is still not installed"
          }

          .\node_modules\.bin\vite.cmd --version
          npm list tailwindcss postcss autoprefixer vite

      - name: Build React app
        shell: pwsh
        run: .\node_modules\.bin\vite.cmd build

      - name: Build Windows EXE
        shell: pwsh
        run: .\node_modules\.bin\electron-builder.cmd --win nsis --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: Aerizen-Windows-EXE
          path: |
            release/*.exe
            release/**/*.exe
            dist/*.exe
            dist/**/*.exe
          if-no-files-found: error
