name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    name: Build Aerizen Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show project structure
        shell: pwsh
        run: |
          Write-Host "Current folder:"
          Get-Location
          Write-Host "Root files:"
          Get-ChildItem -Force
          Write-Host "Source files:"
          Get-ChildItem -Force src
          Write-Host "Electron files:"
          Get-ChildItem -Force electron
          Write-Host "Package JSON:"
          Get-Content package.json

      - name: Enable PNPM
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate
          pnpm --version

      - name: Install dependencies with PNPM
        shell: pwsh
        run: |
          if (Test-Path node_modules) {
            Remove-Item -Recurse -Force node_modules
          }
          pnpm install --no-frozen-lockfile

      - name: Verify installed packages
        shell: pwsh
        run: |
          pnpm list vite tailwindcss postcss autoprefixer electron electron-builder
          pnpm exec vite --version
          if (!(Test-Path "node_modules/tailwindcss")) { throw "tailwindcss is not installed" }
          if (!(Test-Path "node_modules/vite/bin/vite.js")) { throw "vite is not installed" }
          if (!(Test-Path "node_modules/electron-builder/cli.js")) { throw "electron-builder is not installed" }

      - name: Build React app
        shell: pwsh
        run: node .\node_modules\vite\bin\vite.js build

      - name: Build Windows EXE
        shell: pwsh
        run: node .\node_modules\electron-builder\cli.js --win nsis --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: Aerizen-Windows-EXE
          path: |
            release/*.exe
            release/**/*.exe
            dist/*.exe
            dist/**/*.exe
          if-no-files-found: error

      - name: Upload debug build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Aerizen-Build-Output
          path: |
            release/**
            dist/**
          if-no-files-found: ignore
